<div class="header-content">
    <h1 class="page-title"><i class="fa-solid fa-inbox"></i> Tarefas Recebidas</h1>
</div>

<div class="content-area">
    <div id="listaTarefasFuncionario"></div>
</div>

<div id="modalResponderTarefa" class="modal-overlay hidden" style="z-index: 10000;">
    <div class="modal-content" style="max-width: 600px;">
        <h2 id="modalTarefaTitulo" style="margin-bottom: 10px;">Título</h2>
        <p><strong>De:</strong> <span id="modalTarefaRemetente" style="color: var(--color-primary);"></span></p>
        
        <div style="background: var(--color-bg-secondary); padding: 15px; border-radius: 8px; margin: 15px 0; border: 1px solid var(--color-border);">
            <p id="modalTarefaDescricao" style="white-space: pre-wrap; font-size: 14px; margin: 0;"></p>
        </div>

        <div id="modalTarefaAnexosAdmin" style="margin-bottom: 20px;"></div>

        <hr style="border-color: var(--color-border); margin: 20px 0;">

        <h3>Sua Entrega</h3>
        <form id="formEntregarTarefa">
            <input type="hidden" id="entregarTarefaId">
            
            <div class="form-group" style="margin-top: 15px;">
                <label>Título Final para o Relatório</label>
                <input type="text" id="entregarTitulo" class="form-control" required placeholder="Ex: Planilha Finalizada">
            </div>

            <div class="form-group">
                <label>Observações da Entrega (Opcional)</label>
                <textarea id="entregarObservacoes" class="form-control" rows="2" placeholder="Descreva o que foi feito..."></textarea>
            </div>

            <div class="form-group">
                <label>Seus Arquivos de Resposta (Opcional - Máx: 3)</label>
                <div class="file-drop-area">
                    <span class="fake-btn">Escolher arquivos</span>
                    <span class="file-msg">ou arraste e solte aqui</span>
                    <input type="file" id="entregarArquivos" multiple class="file-input">
                </div>
                <div id="entregarArquivosLista" style="margin-top: 10px;"></div>
            </div>

            <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px;">
                <button type="button" class="btn btn-secondary" onclick="fecharModalTarefa()">Cancelar</button>
                <button type="submit" class="btn btn-primary"><i class="fa-solid fa-check"></i> Concluir e Enviar para Relatórios</button>
            </div>
        </form>
    </div>
</div>
